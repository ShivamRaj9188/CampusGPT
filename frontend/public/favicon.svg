<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="8" stroke="#00ff9d" stroke-width="0.75" stroke-opacity="0.35" fill="none"/>

  <!-- Graduation cap board -->
  <polygon points="16,6 28,12 16,18 4,12" fill="#00ff9d" opacity="0.9"/>
  <!-- Cap shadow/depth -->
  <polygon points="16,8 26,12.5 16,17 6,12.5" fill="#050505" opacity="0.2"/>

  <!-- Tassel cord -->
  <path d="M 24.5 12 L 24.5 18.5" stroke="#00ff9d" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Tassel end -->
  <circle cx="24.5" cy="19.5" r="1.5" fill="#00ff9d" opacity="0.7"/>

  <!-- Cap sides going down -->
  <path d="M 8 13.5 L 8 19 Q 16 23 24 19 L 24 13.5" fill="#00ff9d" opacity="0.18"/>
  <path d="M 8 13.5 L 8 19 Q 16 22.5 24 19 L 24 13.5" stroke="#00ff9d" stroke-width="0.75" stroke-opacity="0.5" fill="none"/>

  <!-- Ambient glow dot -->
  <circle cx="16" cy="12" r="1.5" fill="#050505" opacity="0.6"/>
</svg>
